<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>misc.</title>
  <link rel="stylesheet" href="/assets/base.css">
  <style>
    /* Shelf list — index-only. Shared styling lives in /assets/base.css. */
    ul { list-style: none; margin: 0 0 40px; padding: 0 }
    li + li { margin-top: 10px }
    li a {
      display: flex; align-items: baseline; gap: 14px; padding: 14px 16px; border-radius: var(--radius);
      border: 1px solid var(--line); background: var(--panel);
      color: var(--ink); font-size: 15px; text-decoration: none;
      transition: border-color .15s ease, transform .15s ease;
    }
    li a:hover, li a:focus-visible { border-color: var(--accent); transform: translateX(4px); outline: none }
    li a .idx { color: var(--accent) }
    .empty {
      padding: 26px 16px; border: 1px dashed var(--line); border-radius: var(--radius);
      color: var(--muted); font-size: 14px; text-align: center;
    }
    footer { display: flex; justify-content: space-between; align-items: baseline; margin-top: 40px }
    .logout { color: var(--muted); font-size: 13.5px; text-decoration: none }
    .logout:hover, .logout:focus-visible { color: var(--ink) }
  </style>
</head>
<body class="shell">
  <div class="glow" aria-hidden="true"></div>
  <main>
    <p class="eyebrow mono reveal">private index</p>
    <h1 class="reveal">misc<span class="dot">.</span></h1>
    <p class="tagline reveal">Small sites, one shelf. New ones show up below.</p>
    <ul class="reveal">
      <li><a href="/telefonas-teciui/"><span class="idx mono">01</span>Telefonas tėčiui</a></li>
    </ul>
    <footer class="reveal">
      <span class="mono">1 site</span>
      <a class="logout" href="/logout">Log out</a>
    </footer>
  </main>
</body>
</html>

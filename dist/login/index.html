<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Protected</title>
  <style>
    :root { color-scheme: dark }
    * { box-sizing: border-box }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #101012; color: #f2f2f3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    form {
      background: #19191c; border: 1px solid #2c2c31; border-radius: 16px;
      padding: 30px 28px; width: min(460px, 92vw);
      box-shadow: 0 10px 30px -8px rgba(0, 0, 0, .55);
    }
    h1 { margin: 0 0 6px; font-size: 21px }
    p { margin: 0 0 16px; color: #97979f; font-size: 14px }
    .err { color: #f08c8c; margin: -6px 0 14px; font-size: 13.5px }
    input {
      width: 100%; padding: 11px 13px; border-radius: 10px;
      border: 1px solid #2c2c31; background: #121215; color: #f2f2f3; font-size: 15px;
    }
    input:focus { outline: none; border-color: #77777f }
    button {
      width: 100%; margin-top: 12px; padding: 11px; border: 0; border-radius: 10px;
      background: #e9e9eb; color: #1a1a1d; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    button:focus-visible { outline: 2px solid #77777f; outline-offset: 2px }
  </style>
</head>
<body>
  <form method="POST" action="/login">
    <h1>🔒 Welcome</h1>
    <p>Enter the password to access the site.</p>
    <p class="err" id="login-error" hidden>Wrong password — try again.</p>
    <!-- biome-ignore lint/a11y/noAutofocus: login page with single input field -->
    <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" required>
    <button type="submit">Enter</button>
  </form>
  <script>
    // The edge middleware redirects failed logins to /login/?error=1.
    if (new URLSearchParams(location.search).has('error')) {
      document.getElementById('login-error').hidden = false;
    }
  </script>
</body>
</html>

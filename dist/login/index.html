<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>misc.</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101012;
      --ink: #f2f2f3;
      --muted: #97979f;
      --line: #2c2c31;
      --panel: #121215;
      --accent: #e0b568;
    }
    * { box-sizing: border-box }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--ink); overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted);
    }
    /* Soft glow that drifts slowly behind the content. */
    .glow {
      position: fixed; z-index: 0; width: 70vmax; height: 70vmax; border-radius: 50%;
      background: radial-gradient(circle, rgba(224, 181, 104, .07), transparent 60%);
      top: -20vmax; left: -15vmax; pointer-events: none;
      animation: drift 26s ease-in-out infinite alternate;
    }
    @keyframes drift {
      to { transform: translate(30vmax, 18vmax) }
    }
    main {
      position: relative; z-index: 1; width: min(560px, 92vw); padding: 48px 0;
    }
    .eyebrow { margin: 0 0 14px }
    h1 {
      margin: 0 0 10px; font-size: clamp(56px, 12vw, 76px); line-height: 1;
      font-weight: 800; letter-spacing: -.045em;
    }
    h1 .dot { color: var(--accent) }
    .tagline { margin: 0 0 40px; color: var(--muted); font-size: 15px }
    .err { color: #f08c8c; margin: -26px 0 26px; font-size: 13.5px }
    input {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--line); background: var(--panel); color: var(--ink); font-size: 15px;
      transition: border-color .15s ease;
    }
    input:focus { outline: none; border-color: var(--accent) }
    button {
      width: 100%; margin-top: 12px; padding: 14px; border: 0; border-radius: 12px;
      background: #e9e9eb; color: #1a1a1d; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px }
    /* Staggered load-in. */
    .reveal { opacity: 0; transform: translateY(10px); animation: rise .5s ease forwards }
    .reveal:nth-child(2) { animation-delay: .07s }
    .reveal:nth-child(3) { animation-delay: .14s }
    .reveal:nth-child(4) { animation-delay: .21s }
    @keyframes rise {
      to { opacity: 1; transform: none }
    }
    @media (prefers-reduced-motion: reduce) {
      .glow { animation: none }
      .reveal { animation: none; opacity: 1; transform: none }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <main>
    <p class="eyebrow mono reveal">private index</p>
    <h1 class="reveal">misc<span class="dot">.</span></h1>
    <p class="tagline reveal">Enter the password to open the shelf.</p>
    <form class="reveal" method="POST" action="/login">
      <p class="err" id="login-error" hidden>Wrong password — try again.</p>
      <!-- biome-ignore lint/a11y/noAutofocus: login page with single input field -->
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" required>
      <button type="submit">Enter</button>
    </form>
  </main>
  <script>
    // The edge middleware redirects failed logins to /login/?error=1.
    if (new URLSearchParams(location.search).has('error')) {
      document.getElementById('login-error').hidden = false;
    }
  </script>
</body>
</html>
